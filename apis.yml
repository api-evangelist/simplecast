aid: simplecast
url: https://raw.githubusercontent.com/api-evangelist/simplecast/refs/heads/main/apis.yml
name: Simplecast
kind: company
description: Simplecast is a podcast hosting, distribution, and analytics platform
  for creators, networks, and brands, owned by SiriusXM Media (acquired by SiriusXM
  in 2020). It provides podcast and episode management, distribution to Apple
  Podcasts, Spotify, and other channels, embeddable players, and IAB-certified
  audience analytics. Simplecast exposes a documented REST API at
  https://api.simplecast.com covering podcasts, episodes, analytics, and
  distribution channels, authenticated with a bearer token generated from the
  Private Apps page in the Simplecast dashboard. The API is read-oriented and
  self-describing - each response returns the actions available to the
  authenticated user - with a small number of write operations such as uploading
  episode audio. Access requires a Simplecast account; broader API integration is
  positioned as part of the higher-tier (Professional / Enterprise) plans.
