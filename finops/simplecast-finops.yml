meters:
- name: plan_subscription
  description: Recurring monthly or annual plan subscription fee for the chosen Simplecast tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: monthly_downloads
  description: Podcast downloads counted against the plan's monthly download allowance.
  unit: downloads
  aggregation: sum
  dimensions:
  - account
  - podcast
- name: team_seats
  description: Team-member seats included with the plan tier.
  unit: seats
  aggregation: max
  dimensions:
  - account
- name: ad_insertion
  description: Dynamic ad insertion available on Professional and Enterprise tiers; may carry programmatic terms.
  unit: impressions
  aggregation: sum
  dimensions:
  - account
  - podcast
principles:
- name: Visibility
  description: Track monthly downloads per podcast against the plan allowance to anticipate tier upgrades before overage.
- name: Allocation
  description: Map each podcast/show and team seat to a cost center; on multi-show accounts, allocate the plan fee across shows by download share.
- name: Optimization
  description: Right-size the plan to actual download volume and needed analytics depth; only move to Professional/Enterprise when ad insertion, secondary feeds, or API integration are genuinely required.
- name: Accountability
  description: Assign an owner for the Simplecast subscription; review the plan tier against download trends and API/ad needs each renewal.
