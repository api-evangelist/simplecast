description: >-
  FinOps view of Simplecast spend. Simplecast is a subscription SaaS podcast
  hosting, distribution, and analytics platform owned by SiriusXM Media. Cost is
  driven by a recurring monthly (or annual-prepay) plan subscription, with tiers
  differentiated primarily by monthly download allowance, team seats, and
  analytics/ad features. Higher tiers (Professional, Enterprise) are custom
  contracts that add dynamic ad insertion, secondary feeds, and API integration.
  The REST API itself is not separately metered - it reads the same podcast,
  episode, analytics, and distribution data your plan already covers - so API
  usage does not add incremental cost beyond the plan subscription.
notes: >-
  Per-tier prices and download allowances are taken from the public pricing page
  and are not reconciled against a live quote. Enterprise/Professional pricing is
  contact-sales. Reconcile the exact plan, download allowance, and whether API
  access is gated to a higher tier with Simplecast / SiriusXM Media.
