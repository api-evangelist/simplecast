provider: Simplecast
providerId: simplecast
created: '2026-07-05'
modified: '2026-07-05'
reconciled: false
tags:
- Podcasting
- Podcast Hosting
- Podcast Distribution
- Podcast Analytics
- Plans
description: >-
  Simplecast is a subscription podcast hosting, distribution, and analytics
  platform owned by SiriusXM Media. Published self-serve tiers are billed
  monthly (with a discount for annual prepay) and are differentiated primarily
  by monthly download allowance, team seats, and analytics depth. Two higher
  tiers - Professional and Enterprise - are contact-sales only and add dynamic
  ad insertion, secondary/white-labeled feeds, priority support, and, notably,
  API integration (listed as an Enterprise feature). All plans include a 14-day
  commitment-free trial with no credit card required. Prices below reflect the
  published pricing page and are not reconciled against a live quote.
notes: >-
  The Simplecast REST API (https://api.simplecast.com) uses a bearer token from
  the dashboard's Private Apps page. Simplecast's pricing page lists "API
  integration" under the Enterprise tier, so full API access may be gated to
  higher tiers even though the API documentation is public. Verify current
  prices, download allowances, and which tier unlocks API access directly with
  Simplecast / SiriusXM Media sales during reconciliation.
sources:
- https://www.simplecast.com/pricing
- https://www.simplecast.com/
- https://apidocs.simplecast.com/
plans:
- id: simplecast-basic
  name: Basic
  type: paid
  description: >-
    Entry tier for individual creators. Roughly 20,000 downloads per month,
    2 team-member seats, unlimited storage, distribution to all major
    platforms, a custom podcast website, and basic analytics.
  entries:
  - label: Monthly Subscription
    name: basic_monthly
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: '15.00'
    currency: USD
    userMultiplied: false
  - label: Monthly Downloads
    name: basic_downloads
    type: usage
    metric: downloads
    limit: 20000
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  elements:
  - name: 2 Team Seats
  - name: Unlimited Storage
  - name: Distribution to All Platforms
  - name: Custom Website
  - name: Basic Analytics
